# nginx config for a single mehrd validator node.
# Place at /etc/nginx/sites-available/mehrd and symlink to sites-enabled/.
#
# Ports exposed:
#   2083 — gRPC-gateway REST API (plain HTTP; Cloudflare proxy handles TLS) → 1317 (mehrd)
#
# Cloudflare proxy is ON for edge-3.mehrfunds.com, so SSL is terminated at
# the Cloudflare edge. The origin only needs to speak plain HTTP on port 2083,
# which is one of Cloudflare's supported HTTPS-proxy ports.

server {
    listen 2083 ssl;
    server_name edge-3.mehrfunds.com;

    ssl_certificate     /etc/ssl/mehrfunds/origin.crt;
    ssl_certificate_key /etc/ssl/mehrfunds/origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Allow large tx payloads
    client_max_body_size 8m;

    # CORS — allow the dash to call the node from any origin.
    # Hide upstream CORS headers first: mehrd's REST API sets its own
    # Access-Control-Allow-Origin, which would produce a duplicate header
    # that browsers reject.
    add_header Access-Control-Allow-Origin  "*" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    if ($request_method = OPTIONS) { return 204; }

    location / {
        proxy_pass         http://127.0.0.1:1317;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;

        # Strip upstream CORS headers so nginx's add_header is the only source
        proxy_hide_header  Access-Control-Allow-Origin;
        proxy_hide_header  Access-Control-Allow-Headers;
        proxy_hide_header  Access-Control-Allow-Methods;
        proxy_hide_header  Access-Control-Allow-Credentials;
    }
}
