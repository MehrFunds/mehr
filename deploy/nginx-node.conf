# nginx config for a single mehrd validator node.
# Place at /etc/nginx/sites-available/mehrd and symlink to sites-enabled/.
#
# Ports exposed:
#   443   — gRPC-gateway REST API (HTTPS)  → 1317 (mehrd)
#   9090  — gRPC endpoint                  → 9090 (mehrd)
#   26657 — CometBFT RPC (optional, peer)  → 26657 (mehrd)

server {
    listen 443 ssl;
    server_name edge-0.mehrfunds.com;

    ssl_certificate     /etc/letsencrypt/live/edge-0.mehrfunds.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/edge-0.mehrfunds.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Allow large tx payloads
    client_max_body_size 8m;

    # CORS — allow the dash to call the node from any origin during development.
    # Restrict to your domain in production.
    add_header Access-Control-Allow-Origin  "*" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    if ($request_method = OPTIONS) { return 204; }

    location / {
        proxy_pass         http://127.0.0.1:1317;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name edge-0.mehrfunds.com;
    return 301 https://$host$request_uri;
}

# gRPC passthrough (for CosmJS gRPC-web if needed later)
server {
    listen 9090 ssl http2;
    server_name edge-0.mehrfunds.com;

    ssl_certificate     /etc/letsencrypt/live/edge-0.mehrfunds.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/edge-0.mehrfunds.com/privkey.pem;

    location / {
        grpc_pass grpc://127.0.0.1:9090;
    }
}
