on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.suffix }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: .exe
          - goos: windows
            goarch: arm64
            suffix: windows-arm64
            ext: .exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build mehrd-${{ matrix.suffix }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: 0
          GOFLAGS: -buildvcs=false
        run: |
          go build \
            -mod=readonly \
            -ldflags "-s -w \
              -X github.com/cosmos/cosmos-sdk/version.Name=Mehr \
              -X github.com/cosmos/cosmos-sdk/version.AppName=mehrd \
              -X github.com/cosmos/cosmos-sdk/version.Version=${{ github.ref_name }} \
              -X github.com/cosmos/cosmos-sdk/version.Commit=${{ github.sha }}" \
            -o "mehrd-${{ matrix.suffix }}${{ matrix.ext }}" \
            ./cmd/mehrd

      - uses: actions/upload-artifact@v4
        with:
          name: mehrd-${{ matrix.suffix }}
          path: "mehrd-${{ matrix.suffix }}${{ matrix.ext }}"

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: mehrd-*
          generate_release_notes: true
